<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    {% if refresh_seconds %}
    <meta http-equiv="refresh" content="{{ refresh_seconds }}" />
    {% endif %}
    <title>{{ title }}</title>
    <style>
      body {
        font-family: sans-serif;
        line-height: 1.4;
        margin: 1.5rem;
      }
      header,
      footer,
      nav,
      main,
      section,
      article,
      aside {
        margin-bottom: 1rem;
      }
      table {
        border-collapse: collapse;
        width: 100%;
      }
      th,
      td {
        border: 1px solid #ccc;
        padding: 0.35rem;
        text-align: left;
        vertical-align: top;
      }
      code,
      pre {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      pre {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }
      .muted {
        color: #555;
      }
    </style>
  </head>
  <body>
    <header>
      <p><strong>Taskledger</strong></p>
      {% if page_heading %}
      <h1>{{ page_heading }}</h1>
      {% endif %} {% if generated_at %}
      <p class="muted">Generated: <time>{{ generated_at }}</time></p>
      {% endif %}
    </header>
    {% block nav %}{% endblock %}
    <main>{% block content %}{% endblock %}</main>
    <footer>
      <small>Read-only HTML report.</small>
    </footer>
  </body>
</html>
